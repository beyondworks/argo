<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Argo</title>
<link rel="stylesheet" href="/boot.css" />
</head>
<body>
  <!-- 데스크톱 앱 셸 — 회사가 사는 로컬 상주 서버(3001)를 연다. 서버는 부팅 시 자동 기동(launchd/systemd). -->
  <div class="box">
    <div class="star">✦</div>
    <div class="msg">Argo에 연결 중…</div>
    <div class="sub" id="hint"></div>
  </div>
  <!-- CSP 견고성(P0-4): 인라인 스크립트를 self-served 파일로 분리 — Tauri가 nonce를 주입해 'unsafe-inline'이 무시돼도 막히지 않게 -->
  <script src="/boot.js"></script>
</body>
</html>
