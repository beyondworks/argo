<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Argo</title>
<link rel="stylesheet" href="/boot.css" />
</head>
<body>
  <!-- 데스크톱 앱 셸 부트 화면 — 로컬 서버(3001) 준비를 실시간 단계로 보여주고, 준비되면 연다.
       실패도 화면에 보인다(무한 대기 방지) — Rust가 emit하는 boot / boot-log 이벤트 수신. -->
  <div class="box">
    <div class="scene" aria-hidden="true">
      <img class="ship" src="/assets/boot/ship.png" alt="" draggable="false" />
      <img class="wave" src="/assets/boot/wave.png" alt="" draggable="false" />
    </div>
    <div class="msg">Connecting to Argo…</div>
    <div class="sub" id="status">Preparing the app shell…</div>
    <div class="bar" role="progressbar" aria-label="startup progress"><div class="fill" id="fill"></div></div>
    <div class="logtail" id="logtail" hidden></div>
    <div class="err" id="err" hidden></div>
  </div>
  <!-- CSP 견고성(P0-4): 인라인 스크립트 금지 유지 — self-served 파일 -->
  <script src="/boot.js"></script>
</body>
</html>
