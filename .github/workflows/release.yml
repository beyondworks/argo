# 데스크톱 앱 릴리스 빌드 — 맥(Apple Silicon)·Windows 설치파일을 CI에서 만든다.
# Intel Mac은 v0.1.6이 마지막 지원(2026-07-17 유건 결정 — macOS 러너 10배 과금 절감).
# 재지원하려면 matrix에 { os: macos-15-intel, rust_target: x86_64-apple-darwin } 복원.
# Tauri 소스는 하나지만 설치파일은 OS별로 각 러너에서 빌드해야 한다(맥에선 win을 못 만듦).
#
# 트리거: v* 태그 push (예: git tag v0.1.0 && git push origin v0.1.0) 또는 수동 실행.
#
# 사전 준비(beyondworks/argo 저장소 설정 → Secrets and variables → Actions에 등록):
#   NEXT_PUBLIC_SUPABASE_URL        (공개값 — 빌드시 클라이언트에 인라인, 로그인/기기 맥락공유 가능하게)
#   NEXT_PUBLIC_SUPABASE_ANON_KEY   (공개값 — anon 키. 서비스키는 절대 넣지 말 것)
#   RELEASE_TOKEN                   (공개 배포 repo beyondworks/argo-agent에 릴리스 발행용 PAT — contents:write)
#   APPLE_CERTIFICATE               (Developer ID Application .p12의 base64 — 맥 서명·공증용)
#   APPLE_CERTIFICATE_PASSWORD      (.p12 비밀번호)
#   APPLE_SIGNING_IDENTITY          ("Developer ID Application: 이름 (팀ID)")
#   APPLE_ID / APPLE_PASSWORD       (Apple 계정 이메일 / 앱 암호 — 공증 업로드용, 본 비밀번호 아님)
#   APPLE_TEAM_ID                   (10자리 팀 ID)
#   ※ macOS 서명·공증 흐름: tauri v2 번들러는 codesign에 --timestamp(secure timestamp)를 안 붙여 애플
#     공증이 거부한다(설정으로 못 고치는 갭). 그래서 tauri는 ad-hoc으로 빌드하게 두고, 빌드 후 전용 스텝에서
#     이 인증서로 번들 내 전 Mach-O를 --timestamp --options runtime 재서명 → notarytool 공증 → stapler 스테이플한다.
#   ※ APPLE_* 6종 중 인증서/APPLE_ID가 없으면 그 스텝을 스킵해 ad-hoc(미공증) 빌드로 남는다 — Gatekeeper 경고.
#   ※ SUPABASE_SERVICE_ROLE_KEY 등 서버 시크릿은 데스크톱 빌드에 넣지 않는다(설치본 유출 방지).
#
# 주의(후속):
#   - Windows 산출물은 미서명 — SmartScreen 경고. Windows 코드서명 인증서 설정이 필요하다(별도).
#   - Windows 빌드는 첫 실행 시 검증 필요(이 CI는 이 맥에서 실행 검증 불가).

name: Build desktop apps

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - run: npm ci

      # 프로젝트 고유 빌드: stage-sidecar(next standalone + node 사이드카) → tauri build.
      # bash 셸로 고정해 npm 스크립트의 &&·cd가 Windows에서도 동일하게 동작하게 한다.
      #
      # macOS: Apple 서명·공증 env를 여기서 안 넘긴다 — tauri v2 번들러가 codesign에 --timestamp
      # (secure timestamp)를 안 붙여 애플 공증이 거부하기 때문(설정으로 못 고침). tauri는 ad-hoc으로
      # 빌드하게 두고, 아래 "Sign, notarize & staple (macOS)" 스텝에서 우리가 전 Mach-O를 재서명→공증→
      # 스테이플한다. (어차피 재서명으로 덮이므로 tauri에 인증서를 주는 건 불필요한 이중 서명일 뿐. 또
      # APPLE_ID/PASSWORD/TEAM_ID 중 일부만 있으면 tauri가 MissingTeamId로 하드 에러 → 아예 안 넘긴다.)
      - name: Build desktop app (stage-sidecar + tauri)
        shell: bash
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # 인앱 업데이터 서명 — 키는 ~/.tauri/argo-updater.key에서 생성(비밀번호 없음 → 빈 문자열 고정)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run app:build

      # ── macOS 전용: 서명·공증·스테이플 (Windows는 if로 스킵, 기존 경로 그대로) ──────────────
      # 왜 필요한가: tauri v2가 codesign에 --timestamp를 안 붙여(secure timestamp 누락) 애플 공증이
      #   "not signed with a valid Developer ID / signature does not include a secure timestamp"로 거부한다.
      # 무엇을 하나(안쪽→바깥쪽 순서가 핵심):
      #   (1) 재서명용 임시 키체인 생성 후 Developer ID p12 로드 (tauri 임시 키체인은 빌드 후 삭제됨)
      #   (2) 번들 내 "모든" Mach-O 재서명 — 메인 app, node 사이드카뿐 아니라 resources/server 안의
      #       @anthropic-ai claude CLI(실행파일), @next swc·sharp 등 *.node 애드온, libvips *.dylib까지.
      #       하나라도 미서명/미타임스탬프면 공증이 거부하므로 find로 재귀 서명한다.
      #   (3) notarytool 공증(--wait) 실패 시 log 출력 후 실패, 성공 시 stapler 스테이플·검증
      #   (4) 스테이플된 .app으로 업데이터 tar.gz(+.sig)·dmg를 재생성·재서명·재공증 → 미공증 원본 폐기
      # entitlements: node/claude는 arm64에서 V8/JSC JIT을 써서 hardened runtime 아래선 allow-jit 등이
      #   있어야 실행된다(dylib엔 무해). 없으면 서명은 되지만 실행 시 크래시할 수 있어 함께 부여한다.
      - name: Sign, notarize & staple (macOS)
        if: startsWith(matrix.os, 'macos')
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # 업데이터 .sig 재생성용 — 빌드 때와 동일 키(비밀번호 없음)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          set -euo pipefail

          # 인증서/APPLE_ID 미설정이면 스킵 — ad-hoc(미공증) 빌드 유지 (fork·시크릿 없는 실행 안전장치)
          if [ -z "${APPLE_CERTIFICATE:-}" ] || [ -z "${APPLE_ID:-}" ]; then
            echo "Apple 시크릿 미설정 — 서명·공증 스킵(ad-hoc 빌드 유지)"; exit 0
          fi

          BUNDLE_DIR="src-tauri/target/release/bundle"
          APP="$(ls -d "$BUNDLE_DIR"/macos/*.app | head -1)"
          echo "APP=$APP"

          # 임시파일·키체인 경로 + 종료 시 정리 트랩(실패해도 시크릿 잔재 제거)
          KEYCHAIN="$RUNNER_TEMP/argo-signing.keychain-db"
          P12="$RUNNER_TEMP/cert.p12"
          ENTITLEMENTS="$RUNNER_TEMP/entitlements.plist"
          APP_ZIP="$RUNNER_TEMP/notarize-app.zip"
          DMG_TMP="$RUNNER_TEMP/argo-signed.dmg"
          cleanup() { security delete-keychain "$KEYCHAIN" 2>/dev/null || true; rm -f "$P12" "$ENTITLEMENTS" "$APP_ZIP" "$DMG_TMP"; }
          trap cleanup EXIT

          # 공증 헬퍼 — notarytool은 애플 서버 큐라 응답이 늦을 수 있다. --timeout으로 무한 hang을 막고
          # (실측: --wait에 타임아웃 없으면 큐 지연 시 2시간+ 매달림), 큐 지연·일시 장애는 재시도한다.
          # 단 Invalid/Rejected(내용 문제)는 즉시 실패 — 재시도해도 같은 결과라 로그만 남기고 끝낸다.
          notarize() {
            local f="$1" attempt sub status id
            for attempt in 1 2 3; do
              echo "=== 공증 시도 $attempt/3: $(basename "$f") ==="
              sub="$(xcrun notarytool submit "$f" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --output-format json --wait --timeout 30m || true)"
              echo "$sub"
              status="$(printf '%s' "$sub" | jq -r '.status // "unknown"' 2>/dev/null || echo unknown)"
              id="$(printf '%s' "$sub" | jq -r '.id // empty' 2>/dev/null || true)"
              if [ "$status" = "Accepted" ]; then return 0; fi
              if [ "$status" = "Invalid" ] || [ "$status" = "Rejected" ]; then
                echo "✗ 공증 거부(status=$status) — 로그:"
                [ -n "$id" ] && xcrun notarytool log "$id" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" || true
                return 1
              fi
              echo "⚠ 공증 미완(status=$status — 타임아웃/큐 지연) — 60초 후 재시도"; sleep 60
            done
            echo "✗ 공증 3회 모두 미완(애플 큐 지연/장애 지속)"; return 1
          }

          # (1) 재서명용 임시 키체인 — 랜덤 비번은 이 스텝 셸에만 존재(GITHUB_ENV 노출 없음)
          KEYCHAIN_PW="$(openssl rand -base64 24)"
          printf '%s' "$APPLE_CERTIFICATE" | base64 --decode > "$P12"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"                 # 자동 잠금 해제(타임아웃 없음)
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$P12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed 's/["[:space:]]//g')
          rm -f "$P12"

          # entitlements (node/claude JIT용; dylib에 붙어도 무해)
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict>' \
            '<key>com.apple.security.cs.allow-jit</key><true/>' \
            '<key>com.apple.security.cs.allow-unsigned-executable-memory</key><true/>' \
            '<key>com.apple.security.cs.disable-library-validation</key><true/>' \
            '</dict></plist>' > "$ENTITLEMENTS"

          # (2) 번들 내 모든 Mach-O 재서명(안쪽 먼저), 그다음 번들 seal(바깥)
          echo "=== 재서명: nested Mach-O ==="
          while IFS= read -r f; do
            if file -b "$f" 2>/dev/null | grep -q 'Mach-O'; then
              echo "sign: $f"
              codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS" \
                --sign "$APPLE_SIGNING_IDENTITY" --keychain "$KEYCHAIN" "$f"
            fi
          done < <(find "$APP" -type f)

          echo "=== 재서명: 번들 seal ==="
          codesign --force --options runtime --timestamp --entitlements "$ENTITLEMENTS" \
            --sign "$APPLE_SIGNING_IDENTITY" --keychain "$KEYCHAIN" "$APP"

          # 검증 — secure timestamp + hardened runtime 없으면 실패(미공증본 유출 차단).
          # --deep --strict는 쓰지 않는다: resources/server 하위(비표준 위치)의 중첩 Mach-O를
          # 트집 잡아 오탐 실패할 수 있고, 최종 판정은 아래 notarytool이 한다(애플이 진짜 검증자).
          codesign --verify --verbose=2 "$APP"
          INFO="$(codesign -dvvv "$APP" 2>&1)"; echo "$INFO"
          echo "$INFO" | grep -q '^Timestamp='                       || { echo '✗ secure timestamp 없음'; exit 1; }
          echo "$INFO" | grep -Eq 'flags=0x[0-9a-fA-F]+\([^)]*runtime' || { echo '✗ hardened runtime 없음'; exit 1; }
          echo "✓ secure timestamp + hardened runtime 확인"

          # (3) .app 공증 + 스테이플
          echo "=== 공증: .app ==="
          ditto -c -k --keepParent --sequesterRsrc "$APP" "$APP_ZIP"
          notarize "$APP_ZIP" || exit 1
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"
          echo "✓ .app 공증·스테이플 완료"

          # (4a) 업데이터 tar.gz(+.sig) 재생성 — 스테이플된 .app으로. Collect 글롭이 그대로 집도록 원래 이름 유지
          echo "=== 업데이터 아티팩트 재생성 ==="
          MACOS_DIR="$BUNDLE_DIR/macos"
          APP_BASENAME="$(basename "$APP")"                          # 예: argo.app
          rm -f "$MACOS_DIR"/*.app.tar.gz "$MACOS_DIR"/*.app.tar.gz.sig
          ( cd "$MACOS_DIR" && COPYFILE_DISABLE=1 tar czf "${APP_BASENAME}.tar.gz" "$APP_BASENAME" )
          npx @tauri-apps/cli@^2 signer sign "$MACOS_DIR/${APP_BASENAME}.tar.gz" </dev/null   # 키·비번은 env에서
          ls -la "$MACOS_DIR"/*.app.tar.gz*

          # (4b) DMG 재생성 — 스테이플된 .app으로 새로 말아 서명·공증·스테이플. 미공증 원본 dmg는 폐기
          echo "=== DMG 재생성 ==="
          DMG_DIR="$BUNDLE_DIR/dmg"
          ORIG_DMG="$(ls "$DMG_DIR"/*.dmg 2>/dev/null | head -1 || true)"    # 예: argo_0.1.11_aarch64.dmg (set -e·pipefail에서 dmg 없어도 폴백 살도록)
          DMG_STAGE="$(mktemp -d)"
          cp -R "$APP" "$DMG_STAGE/"
          ln -s /Applications "$DMG_STAGE/Applications"
          hdiutil create -volname "Argo" -srcfolder "$DMG_STAGE" -ov -format UDZO "$DMG_TMP"
          rm -rf "$DMG_STAGE"
          codesign --force --timestamp --sign "$APPLE_SIGNING_IDENTITY" --keychain "$KEYCHAIN" "$DMG_TMP"
          echo "=== 공증: dmg ==="
          notarize "$DMG_TMP" || exit 1
          xcrun stapler staple "$DMG_TMP"
          xcrun stapler validate "$DMG_TMP"
          rm -f "$DMG_DIR"/*.dmg
          if [ -n "$ORIG_DMG" ]; then cp "$DMG_TMP" "$ORIG_DMG"; else cp "$DMG_TMP" "$DMG_DIR/argo_aarch64.dmg"; fi
          ls -la "$DMG_DIR"
          echo "✓ DMG 공증·스테이플 완료 — 재서명·공증·스테이플 전 산출물 준비됨"

      - name: Collect installers
        shell: bash
        run: |
          mkdir -p dist
          cp src-tauri/target/release/bundle/dmg/*.dmg   dist/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/msi/*.msi   dist/ 2>/dev/null || true
          cp src-tauri/target/release/bundle/nsis/*.exe  dist/ 2>/dev/null || true
          # 인앱 업데이터 아티팩트 — Windows는 -setup.exe 서명(.sig), 맥은 .app.tar.gz(+.sig).
          # 맥 두 아치가 같은 파일명(argo.app.tar.gz)이라 릴리스 자산 충돌 방지를 위해 target별 리네임.
          cp src-tauri/target/release/bundle/nsis/*.sig  dist/ 2>/dev/null || true
          for f in src-tauri/target/release/bundle/macos/*.app.tar.gz; do
            if [ -e "$f" ]; then cp "$f" "dist/argo-${{ matrix.rust_target }}.app.tar.gz"; fi
          done
          for f in src-tauri/target/release/bundle/macos/*.app.tar.gz.sig; do
            if [ -e "$f" ]; then cp "$f" "dist/argo-${{ matrix.rust_target }}.app.tar.gz.sig"; fi
          done
          # 고정 파일명 사본 — README·랜딩의 releases/latest 직다운로드 링크가 버전과 무관하게 유지되도록
          for f in src-tauri/target/release/bundle/dmg/*aarch64.dmg; do
            if [ -e "$f" ]; then cp "$f" dist/argo-macos-apple-silicon.dmg; fi
          done
          for f in src-tauri/target/release/bundle/nsis/*-setup.exe; do
            if [ -e "$f" ]; then cp "$f" dist/argo-windows-setup.exe; fi
          done
          ls -la dist

      - uses: actions/upload-artifact@v4
        with:
          name: argo-${{ matrix.rust_target }}
          path: dist/*
          if-no-files-found: warn

  release:
    needs: build
    # always() — build matrix 일부(예: Windows)가 실패해도 성공한 OS 산출물로 draft를 만든다.
    # (없으면 needs 하나라도 실패 시 release가 스킵돼 draft가 안 생긴다 — v0.1.0 실측 이슈)
    if: always() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      # 인앱 업데이터 매니페스트 — 앱의 updater 엔드포인트(releases/latest/download/latest.json)가 읽는다.
      # draft 게시 전엔 latest/download가 이전 릴리스를 가리키므로, 사람이 draft를 게시해야 업데이트가 활성화된다.
      - name: Generate updater manifest (latest.json)
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const tag = process.env.TAG;
          const dir = 'dist';
          const base = `https://github.com/beyondworks/argo-agent/releases/download/${tag}`;
          const entry = (f) => ({ url: `${base}/${f}`, signature: fs.readFileSync(`${dir}/${f}.sig`, 'utf8').trim() });
          const pick = (re) => fs.readdirSync(dir).find((f) => re.test(f));
          const platforms = {};
          for (const [key, re] of [
            ['darwin-aarch64', /aarch64-apple-darwin\.app\.tar\.gz$/],
            ['darwin-x86_64', /x86_64-apple-darwin\.app\.tar\.gz$/],
            ['windows-x86_64', /_x64-setup\.exe$/], // 고정 파일명(argo-windows-setup.exe, sig 없음)과 구분 — 버전명 파일만
          ]) {
            const f = pick(re);
            if (f && fs.existsSync(`${dir}/${f}.sig`)) platforms[key] = entry(f);
            else console.warn(`[manifest] ${key} updater artifact missing — skipped`);
          }
          if (Object.keys(platforms).length) {
            fs.writeFileSync(`${dir}/latest.json`, JSON.stringify({
              version: tag.replace(/^v/, ''),
              pub_date: new Date().toISOString(),
              platforms,
            }, null, 2));
            console.log(fs.readFileSync(`${dir}/latest.json`, 'utf8'));
          } else {
            console.warn('[manifest] no updater artifacts — latest.json skipped');
          }
          EOF
      # 공개 배포 repo(beyondworks/argo-agent)에 발행 — 소스(private argo)는 유출되지 않는다.
      # cross-repo라 RELEASE_TOKEN(argo-agent contents:write PAT) 필요. draft=true라 검토 후 사람이 게시.
      - uses: softprops/action-gh-release@v2
        with:
          repository: beyondworks/argo-agent
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/**/*
          draft: true
          body: |
            ## ⬇ 어떤 파일을 받아야 하나요? / Which file should I download?

            | 내 컴퓨터 / Your machine | 받을 파일 / Download |
            |---|---|
            | **Mac — Apple Silicon** (M1·M2·M3·M4) | [argo-macos-apple-silicon.dmg](https://github.com/beyondworks/argo-agent/releases/download/${{ github.ref_name }}/argo-macos-apple-silicon.dmg) |
            | **Windows 10+** | [argo-windows-setup.exe](https://github.com/beyondworks/argo-agent/releases/download/${{ github.ref_name }}/argo-windows-setup.exe) |

            > Intel Mac은 [v0.1.6](https://github.com/beyondworks/argo-agent/releases/download/v0.1.6/argo_0.1.6_x64.dmg)이 마지막 지원 버전입니다. / Intel Macs: v0.1.6 is the last supported build.

            기존 설치 사용자는 앱 안에서: **설정 → 기기 → 앱 업데이트**. / Existing users: **Settings → Devices → App updates**.

            ## 설치 — 첫 실행 안내 / First-run notes
            현재 빌드는 코드 서명 전이라 처음 실행 시 OS 보안 경고가 뜹니다. 정상이며 안전합니다.
            Builds are not yet code-signed; the one-time OS prompt is expected and safe.
            - **macOS**: 앱 우클릭 → 열기 → 다시 열기 (또는 시스템 설정 → 개인정보 보호 및 보안 → 확인 없이 열기) / Right-click → Open → Open (or Privacy & Security → "Open Anyway")
            - **Windows**: SmartScreen에서 추가 정보 → 실행 / More info → Run anyway
